name: Run Gex report

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 
  
  schedule:
    # Runs at minute 15 of hours 9, 10, 12, 13, 15, and 16 (Monday to Friday)
    - cron: '15 9,10,12,13,15,16 * * 1-5' 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Changed name to make debugging easier in the Actions UI
  run-gex-job:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install playwright pytest
        python -m playwright install chromium --with-deps

    # Fixed: "env:" is now flush underneath the target run execution block
    - name: Run Playwright Script
      env:
        USER_ID: ${{ secrets.TELE_CHAT_ID }}
        USER_SECRET: ${{ secrets.TELE_TOKEN }}
      run: python run.py
