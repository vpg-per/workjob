name: GEX Scrape
on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10am ET weekdays
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install playwright requests
      - run: playwright install chromium --with-deps
      - run: python scrape_and_post.py
        env:
          INGEST_URL: ${{ secrets.RENDER_INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
