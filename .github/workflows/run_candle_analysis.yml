name: Run Candle analysis

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 
  
  # schedule:
    # Changed from a step-increment slash to an explicit comma-separated minute list.
    # This prevents the GitHub Actions runner engine from skipping the high-frequency trigger.
    # - cron: '2,17,32,47 14,15,16,17,18,20,21 * * 1-5' 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-script:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Fixed: Installed requirements first, then systematically set up Playwright binaries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Fixed: Corrected alignment for 'env:'. It must sit exactly flush under the target step execution block.
    - name: Run Candle analysis
      env:
        USER_ID: ${{ secrets.TELE_CHAT_ID }}
        USER_SECRET: ${{ secrets.TELE_TOKEN }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python run_candle_analysis.py
